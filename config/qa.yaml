environment: qa

claude:
  model: claude-sonnet-4-6
  max_tokens: 4096
  max_retries: 3

s3:
  bucket: contract-extraction-qa
  prefix: contracts/
  region: us-east-1

snowflake:
  account: ${SNOWFLAKE_ACCOUNT}
  user: ${SNOWFLAKE_USER}
  password: ${SNOWFLAKE_PASSWORD}
  warehouse: QA_WH
  database: CONTRACTS_QA
  schema: EXTRACTED

sqs:
  queue_url: ${SQS_QUEUE_URL_QA}
  region: us-east-1

pipeline:
  max_workers: 4
  confidence_threshold: 0.80
  chunk_size: 4000
  chunk_overlap: 200

logging:
  level: INFO
