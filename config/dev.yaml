environment: dev

claude:
  model: claude-sonnet-4-6
  max_tokens: 4096
  max_retries: 3

s3:
  bucket: contract-extraction-dev
  prefix: contracts/
  region: us-east-1

snowflake:
  account: ${SNOWFLAKE_ACCOUNT}
  user: ${SNOWFLAKE_USER}
  password: ${SNOWFLAKE_PASSWORD}
  warehouse: DEV_WH
  database: CONTRACTS_DEV
  schema: EXTRACTED

sqs:
  queue_url: ${SQS_QUEUE_URL_DEV}
  region: us-east-1

pipeline:
  max_workers: 2
  confidence_threshold: 0.75
  chunk_size: 4000
  chunk_overlap: 200

logging:
  level: DEBUG
